<title>Mon Budget Master Pro</title>
<style>
       :root {
           --bg-color: #f2f2f7;
           --card-bg: #ffffff;
           --text-color: #1c1c1e;
           --text-secondary: #8e8e93;
           --primary: #007aff;
           --danger: #ff3b30;
           --success: #34c759;
           --warning: #ff9500;
           --border: #e5e5ea;
           --accent-gradient: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);
           --blue-gradient: linear-gradient(135deg, #0051a8 0%, #007aff 100%);
       }

       * { box-sizing: border-box; }

       body {
           font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
           background-color: var(--bg-color);
           color: var(--text-color);
           margin: 0;
           padding: env(safe-area-inset-top) 16px 60px 16px;
           -webkit-tap-highlight-color: transparent;
       }

       h1 { font-size: 28px; font-weight: 800; margin: 24px 0 16px 0; letter-spacing: -0.5px; }
       h2 { font-size: 13px; font-weight: 700; margin: 28px 0 12px 4px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); }
       .card { background: var(--card-bg); border-radius: 16px; padding: 18px; box-shadow: 0 8px 24px rgba(0,0,0,0.04); margin-bottom: 20px; border: 1px solid rgba(0, 0, 0, 0.02); }
       .main-dash { background: var(--accent-gradient); color: white; }
       .main-dash.total-dash { background: var(--blue-gradient); margin-top: -10px; }
       .balance-row { display: table; width: 100%; margin-bottom: 10px; font-size: 14px; }
       .balance-cell-left { display: table-cell; text-align: left; opacity: 0.9; }
       .balance-cell-right { display: table-cell; text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
       .balance-row.total { margin-bottom: 0; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.15); font-weight: 700; font-size: 17px; }

       .progress-container { margin-top: 10px; background: rgba(255, 255, 255, 0.15); border-radius: 6px; height: 6px; overflow: hidden; }
       .progress-bar { background: var(--success); height: 100%; width: 100%; transition: width 0.3s ease; }

       input, button { font-size: 15px; padding: 12px; border: 1px solid var(--border); border-radius: 12px; outline: none; width: 100%; background: var(--card-bg); }
       button { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; }
       .bank-item { padding: 16px 0; border-bottom: 1px solid var(--border); }
       .bank-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
       .bank-bottom { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-secondary); padding-left: 34px; gap: 8px; }
       .plafond-input, .marge-input, .aides-input { width: 60px; padding: 4px 6px; font-size: 13px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
       .savings-input-global { width: 110px; font-size: 18px; font-weight: 800; color: #248a3d; border: 1px solid rgba(52,199,89,0.3); border-radius: 10px; padding: 6px 8px; text-align: right; }
       .list-container { background: var(--card-bg); border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.04); }
       .item-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>
<h1>Mon Budget</h1>
<h2>Flux Mensuel</h2>
<div class="card main-dash">
<div class="balance-row"><div class="balance-cell-left">Salaire net + Aides :</div><div class="balance-cell-right" id="dashTotalIncome">0,00 €</div></div>
<div class="balance-row" style="color: #ffb3b3;"><div class="balance-cell-left">Charges + Marge CA :</div><div class="balance-cell-right" id="dashOutCA">0,00 €</div></div>
<div class="balance-row"><div class="balance-cell-left">Placements (Bourso + Fort + Ép) :</div><div class="balance-cell-right" id="dashPlacements">0,00 €</div></div>
<div class="balance-row total"><div class="balance-cell-left">RESTE À VIVRE :</div><div class="balance-cell-right" id="salaryRemaining">0,00 €</div></div>
</div>

<div class="card">
<label style="font-size: 11px; color: var(--text-secondary);">Salaire Net :</label>
<input type="number" id="salaryInput" oninput="calculateDistribution()">
</div>

<h2>Répartition</h2>
<div class="card">
<div class="bank-item">
<div class="bank-top"><span>1. Crédit Agricole</span><span class="bank-amount" id="distCA">0,00 €</span></div>
<div class="bank-bottom">
<span>Marge : <input type="number" id="margeCA" class="marge-input" value="50" oninput="calculateDistribution()"></span>
<span>Aides : <input type="number" id="aidesInput" class="aides-input" value="0" oninput="calculateDistribution()"></span>
</div>
</div>
<div class="bank-item">
<div class="bank-top"><span>2. Boursorama</span><span id="distBourso">0,00 €</span></div>
<div class="bank-bottom"><span>Plafond : <input type="number" id="plafondBourso" class="plafond-input" value="430" oninput="calculateDistribution()"></span></div>
</div>
<div class="bank-item">
<div class="bank-top"><span>3. Fortuneo</span><span id="distFortuneo">0,00 €</span></div>
<div class="bank-bottom"><span>Plafond : <input type="number" id="plafondFortuneo" class="plafond-input" value="800" oninput="calculateDistribution()"></span></div>
</div>
<div class="bank-item" style="border-bottom:none;">
<div class="bank-top"><span>4. Épargne du Mois</span><span id="distSavings">0,00 €</span></div>
</div>
</div>

<div class="list-container" id="expenseList"></div>

<script>
       let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
       function calculateDistribution() {
           const salary = parseFloat(document.getElementById('salaryInput').value) || 0;
           const aides = parseFloat(document.getElementById('aidesInput').value) || 0;
           const marge = parseFloat(document.getElementById('margeCA').value) || 0;
           const pB = parseFloat(document.getElementById('plafondBourso').value) || 0;
           const pF = parseFloat(document.getElementById('plafondFortuneo').value) || 0;

           let totalD = expenses.reduce((sum, e) => sum + e.amount, 0);

           // Logique selon votre nouvelle demande
           let dispo = (salary + aides) - (totalD + marge);
           let b = Math.min(Math.max(0, dispo), pB);
           dispo -= b;
           let f = Math.min(Math.max(0, dispo), pF);
           dispo -= f;

           let epargne = Math.floor(Math.max(0, dispo) / 10) * 10;
           let finalCA = totalD + marge + (dispo - epargne);

           document.getElementById('distCA').innerText = finalCA.toFixed(2) + " €";
           document.getElementById('distBourso').innerText = b.toFixed(2) + " €";
           document.getElementById('distFortuneo').innerText = f.toFixed(2) + " €";
           document.getElementById('distSavings').innerText = epargne.toFixed(2) + " €";

           document.getElementById('dashTotalIncome').innerText = (salary + aides).toFixed(2) + " €";
           document.getElementById('dashOutCA').innerText = (totalD + marge).toFixed(2) + " €";
           document.getElementById('dashPlacements').innerText = (b + f + epargne).toFixed(2) + " €";
           document.getElementById('salaryRemaining').innerText = ((salary + aides) - (finalCA + b + f + epargne)).toFixed(2) + " €";
       }
       calculateDistribution();
</script>
</body>
</html>
