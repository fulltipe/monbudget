<script>
(function(){
  function show(msg){
    var b=document.getElementById("errbox"), m=document.getElementById("errmsg");
    if(b&&m){ m.textContent=String(msg); b.style.display="block"; }
  }
  window.__pronoShow = show;
  window.addEventListener("error", function(e){ show("ERREUR JS : "+(e.message||e.error||"inconnue")+(e.filename?("\n@ "+e.filename+":"+e.lineno):"")); });
  window.addEventListener("unhandledrejection", function(e){ show("Promesse rejetée : "+(e.reason&&e.reason.message?e.reason.message:e.reason)); });
 
  // Diagnostic des dépendances après 5 secondes si l'appli n'a rien affiché
  setTimeout(function(){
    var r=document.getElementById("root");
    if(r && r.childElementCount>0) return; // l'appli s'est affichée : tout va bien
    var pb=[];
    if(typeof React==="undefined")    pb.push("• React non chargé (CDN unpkg bloqué ?)");
    if(typeof ReactDOM==="undefined") pb.push("• ReactDOM non chargé");
    if(typeof Babel==="undefined")    pb.push("• Babel non chargé (le JSX ne peut pas être transformé)");
    if(typeof window.supabase==="undefined") pb.push("• Librairie Supabase non chargée");
    var url=window.SUPABASE_URL||"", key=window.SUPABASE_ANON_KEY||"";
    if(!url || url.indexOf("VOTRE_")===0) pb.push("• SUPABASE_URL non renseignée (mode local : données NON partagées)");
    if(!key || key.indexOf("VOTRE_")===0) pb.push("• SUPABASE_ANON_KEY non renseignée");
    var diag = "DIAGNOSTIC (l'appli ne s'est pas affichée en 5 s) :\n\n";
    diag += (pb.length? pb.join("\n") : "Toutes les librairies semblent chargées, mais le rendu n'a pas eu lieu.\nLe JSX a peut-être échoué à la transformation. Recharge la page (en vidant le cache).");
    diag += "\n\nNavigateur : "+navigator.userAgent;
    show(diag);
  }, 5000);
})();
</script>

// Cote d'une issue de match. Utilise d'abord les vraies cotes MPP ; sinon, calcul auto.
function matchOdds(home,away){
  const exact = MATCH_ODDS[home+"|"+away];
  if(exact) return { home:exact[0], draw:exact[1], away:exact[2] };
  // repli : calcul automatique façon MPP selon le niveau des équipes
  const dh=force(home), da=force(away);
  const diff=dh-da;
  const pHome=0.42+diff*0.05, pAway=0.42-diff*0.05;
  const clamp=(x)=>Math.max(0.05,Math.min(0.85,x));
  const cH=clamp(pHome), cA=clamp(pAway);
  const cN=clamp(0.30 - Math.abs(diff)*0.018);
  const K=12;
  const toPts=(p)=> Math.max(11, Math.min(85, Math.round(K/p)));
  let oH=toPts(cH), oA=toPts(cA), oN=toPts(cN);
  const minTeam=Math.min(oH,oA);
  if(oN<=minTeam) oN=minTeam+2;
  return { home:oH, draw:oN, away:oA };
}

// ----------------------- Barème de points façon MPP (vraies cotes) ----------
// Les points d'un match = la COTE (en points) de l'issue trouvée (calculée auto).
// Les points vainqueur/buteur sont des valeurs fixes MPP (tables WINNER_PTS / SCORER_PTS).
// exactMult : multiplicateur si le score est exact (1,5 = fidèle au MPP actuel).
const DEFAULT_RULES = { exactMult:1.5 };
 
const sgn=(a,b)=> a>b?1:a<b?-1:0;
 
// Points d'un match : on prend directement la cote (en points) de l'issue obtenue.
function matchPoints(prono, score, rules, home, away){
  if(!prono || !score) return 0;
  const {hp,ap}=prono, {hs,as}=score;
  if(hp===""||ap===""||hs===null||as===null) return 0;
  const issue = sgn(Number(hp),Number(ap));      // ce que le joueur a prédit
  const real  = sgn(hs,as);                       // ce qui s'est passé
  if(issue!==real) return 0;                       // mauvais résultat -> 0 point
  const odds = matchOdds(home,away);
  let pts = issue>0?odds.home : issue<0?odds.away : odds.draw; // points = cote
  const exact = Number(hp)===hs && Number(ap)===as;
  if(exact) pts = Math.round(pts * rules.exactMult); // bonus score exact
  return pts;
}
 
// ----------------------- Hachage des mots de passe --------------------------
// Les mots de passe ne sont jamais stockés en clair : on garde une empreinte
// SHA-256 irréversible. Même via F12, on ne peut pas retrouver le mot de passe.
const PWD_SALT = "prono_cdm2026::"; // sel fixe pour renforcer l'empreinte
async function hashPwd(plain){
  try{
    const data = new TextEncoder().encode(PWD_SALT + String(plain));
    const buf = await crypto.subtle.digest("SHA-256", data);
    return "h$" + Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }catch(e){
    // Repli si SubtleCrypto indisponible (très rare, ex. contexte non sécurisé)
    let h=0; const s=PWD_SALT+String(plain);
    for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))|0; }
    return "x$" + (h>>>0).toString(16);
  }
}
// Une empreinte commence par "h$" (ou "x$"). Tout le reste est un mot de passe en clair (ancien format).
const isHashed = (v)=> typeof v==="string" && (v.startsWith("h$") || v.startsWith("x$"));
// Vérifie un mot de passe saisi contre la valeur stockée (gère l'ancien format en clair).
async function verifyPwd(plain, stored){
  if(stored==null) return false;
  if(isHashed(stored)) return (await hashPwd(plain))===stored;
  return String(plain)===String(stored); // ancien compte pas encore migré
}

// --- Couche Supabase : tout l'état est stocké dans 1 ligne JSON (table prono_state) ---
let _sb=null;
function sb(){
  if(_sb) return _sb;
  if(!window.SUPABASE_URL || window.SUPABASE_URL.indexOf("VOTRE_")===0){ return null; }
  _sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  return _sb;
}
const ROW_ID = 1; // une seule ligne partagée
// Complète les champs ajoutés par les nouvelles fonctionnalités sur d'anciennes bases.
// Admins "garantis" : ne peuvent jamais être rétrogradés par erreur. D'autres
// admins peuvent être nommés librement depuis l'interface (choix 1B).
const ADMIN_CORE = ["admin","secours"];
 
function migrate(db){
  if(!db) return db;
  db.pending = db.pending || {};
  db.notifs  = db.notifs  || {};
  db.pwdRequests = db.pwdRequests || {};
  Object.values(db.users||{}).forEach(u=>{
    if(u.approved===undefined) u.approved = true; // comptes existants : considérés validés
    if(u.adjust===undefined)   u.adjust   = 0;
    // Les comptes "core" restent toujours admin ; les autres gardent leur statut tel quel.
    if(ADMIN_CORE.includes((u.login||"").toLowerCase())) u.isAdmin = true;
    if(u.isAdmin) delete db.pronos[u.login]; // un admin ne pronostique pas
  });
  return db;
}
// ----------------------- Brouillage du stockage ----------------------------
// Les données envoyées vers Supabase sont brouillées (chiffrement réversible
// léger) pour ne pas être lisibles en clair côté base. Note : la clé est dans
// le code, donc c'est de la dissuasion, pas une sécurité absolue.
// Les mots de passe à l'intérieur restent en plus hachés (irréversibles).
const SCRAMBLE_KEY = "pr0n0-Cdm-2026-x7Qz!";
const SCRAMBLE_TAG = "ENC1:"; // préfixe identifiant une charge brouillée
 
function _xor(str){
  let out="";
  for(let i=0;i<str.length;i++){
    out += String.fromCharCode(str.charCodeAt(i) ^ SCRAMBLE_KEY.charCodeAt(i % SCRAMBLE_KEY.length));
  }
  return out;
}
// objet -> chaîne brouillée
function scramble(obj){
  try{
    const json = JSON.stringify(obj);
    // encodage base64 sûr pour l'UTF-8
    const b64 = btoa(unescape(encodeURIComponent(_xor(json))));
    return SCRAMBLE_TAG + b64;
  }catch(e){ console.error("scramble error",e); return obj; }
}
// valeur stockée -> objet (gère l'ancien format en clair)
function unscramble(val){
  try{
    if(val && typeof val==="object") return val; // ancien format : objet JSON direct
    if(typeof val==="string" && val.startsWith(SCRAMBLE_TAG)){
      const b64 = val.slice(SCRAMBLE_TAG.length);
      const json = _xor(decodeURIComponent(escape(atob(b64))));
      return JSON.parse(json);
    }
    if(typeof val==="string") return JSON.parse(val); // chaîne JSON en clair éventuelle
  }catch(e){ console.error("unscramble error",e); }
  return null;
}
 
async function loadDB(){
  const client=sb();
  if(!client){ // pas encore configuré -> mode local de secours
    try{ const l=localStorage.getItem(DB_KEY); const db=l?unscramble(l):null; if(db && Object.keys(db.users||{}).length>0) return migrate(db); }catch(e){}
    return seedDB();
  }
  try{
    const { data, error } = await client.from("prono_state").select("data").eq("id",ROW_ID).maybeSingle();
    if(error) throw error;
    const db = data && data.data ? unscramble(data.data) : null;
    if(db && Object.keys(db.users||{}).length>0) return migrate(db);
    // ligne vide -> on seed et on pousse (brouillé)
    const fresh = seedDB();
    await client.from("prono_state").upsert({ id:ROW_ID, data:scramble(fresh) });
    return fresh;
  }catch(e){
    console.error("Supabase load error:",e);
    try{ const l=localStorage.getItem(DB_KEY); const db=l?unscramble(l):null; if(db) return migrate(db); }catch(_){}
    return seedDB();
  }
}
async function saveDB(db){
  // localStorage et Supabase reçoivent désormais la version brouillée.
  try{ localStorage.setItem(DB_KEY, scramble(db)); }catch(e){}
  const client=sb();
  if(!client) return true;
  try{
    const { error } = await client.from("prono_state").upsert({ id:ROW_ID, data:scramble(db) });
    if(error) throw error;
    return true;
  }catch(e){ console.error("Supabase save error:",e); return false; }
}

// ============================================================================
function App(){
  const [db,setDb]=useState(null);
  const [me,setMe]=useState(null); // login
  const [tab,setTab]=useState("matchs");
  const [now,setNow]=useState(Date.now());
  const [toast,setToast]=useState(null);
  const [showNotifs,setShowNotifs]=useState(false);
 
  useEffect(()=>{
    loadDB().then(async (loaded)=>{
      // Migration : hacher les mots de passe encore stockés en clair, une fois pour toutes.
      let changed=false;
      for(const u of Object.values(loaded.users||{})){
        if(u && u.pwd!=null && !isHashed(u.pwd)){ u.pwd=await hashPwd(u.pwd); changed=true; }
      }
      for(const p of Object.values(loaded.pending||{})){
        if(p && p.pwd!=null && !isHashed(p.pwd)){ p.pwd=await hashPwd(p.pwd); changed=true; }
      }
      setDb(loaded);
      if(changed) saveDB(loaded); // on pousse la version sécurisée
    });
  },[]);
  useEffect(()=>{ const t=setInterval(()=>setNow(Date.now()),1000); return ()=>clearInterval(t); },[]);
  // rafraîchit la base régulièrement pour voir chat/scores des autres
  useEffect(()=>{
    const t=setInterval(async()=>{ const fresh=await loadDB(); setDb(fresh); },15000);
    return ()=>clearInterval(t);
  },[]);
 
  const flash=(msg)=>{ setToast(msg); setTimeout(()=>setToast(null),2600); };
 
  const persist=async(updater)=>{
    setDb(prev=>{
      const next= typeof updater==="function"?updater(structuredClone(prev)):updater;
      saveDB(next);
      return next;
    });
  };
 
  if(!db) return <Splash/>;
  if(!me) return <Auth db={db} persist={persist} onLogin={setMe} flash={flash} toast={toast}/>;
 
  const user=db.users[me];
  if(!user){ setMe(null); return null; }
 
  // l'admin n'a pas accès à Matchs/Spéciaux : on le bascule sur Admin si besoin
  const adminBlocked = user.isAdmin && (tab==="matchs"||tab==="speciaux");
  const effTab = adminBlocked ? "admin" : tab;
 
  const myNotifs = (db.notifs && db.notifs[me]) ? db.notifs[me] : [];
  const unread = myNotifs.filter(n=>!n.read).length;
 
  const openNotifs=()=>{
    setShowNotifs(true);
    persist(prev=>{ if(prev.notifs && prev.notifs[me]) prev.notifs[me].forEach(n=>n.read=true); return prev; });
  };
  const clearNotifs=()=> persist(prev=>{ if(prev.notifs) prev.notifs[me]=[]; return prev; });
 
  return (
    <div style={S.app}>
      <Style/>
      <Header user={user} unread={unread} onBell={openNotifs} onLogout={()=>setMe(null)}/>
      <Nav tab={effTab} setTab={setTab} isAdmin={user.isAdmin}/>
      <main style={S.main}>
        {effTab==="matchs" && !user.isAdmin && <Matchs db={db} me={me} now={now} persist={persist} flash={flash}/>}
        {effTab==="speciaux" && !user.isAdmin && <Speciaux db={db} me={me} now={now} persist={persist} flash={flash}/>}
        {effTab==="termines" && <Termines db={db} me={me} isAdmin={user.isAdmin}/>}
        {effTab==="classement" && <Classement db={db} me={me}/>}
        {effTab==="chat" && <Chat db={db} user={user} persist={persist}/>}
        {effTab==="profil" && <Profil db={db} me={me} persist={persist} flash={flash}/>}
        {effTab==="admin" && user.isAdmin && <Admin db={db} now={now} persist={persist} flash={flash}/>}
      </main>
      {showNotifs && <NotifPanel notifs={myNotifs} onClose={()=>setShowNotifs(false)} onClear={clearNotifs}/>}
      {toast && <div style={S.toast}>{toast}</div>}
    </div>
  );
}

// ----------------------- Auth -----------------------------------------------
function Auth({db,persist,onLogin,flash,toast}){
  const [mode,setMode]=useState("login");
  const [login,setLogin]=useState("");
  const [pwd,setPwd]=useState("");
  const [name,setName]=useState("");
  const [reqLogin,setReqLogin]=useState(""); // identifiant pour la demande de changement de MdP
  const noUsers = Object.keys(db.users).length===0;
 
  // Demande de changement de mot de passe (utilisateur ayant oublié son MdP)
  const submitPwdRequest=()=>{
    const l=reqLogin.trim().toLowerCase();
    if(!l){ flash("Indique ton identifiant"); return; }
    if(!db.users[l]){ flash("Aucun compte avec cet identifiant"); return; }
    persist(prev=>{
      prev.pwdRequests=prev.pwdRequests||{};
      prev.pwdRequests[l]={login:l,name:prev.users[l]?.name||l,ts:Date.now()};
      Object.values(prev.users).filter(u=>u.isAdmin).forEach(a=>{
        pushNotif(prev, a.login, "account", `🔑 ${prev.users[l]?.name||l} (@${l}) demande un changement de mot de passe.`);
      });
      return prev;
    });
    setReqLogin("");
    flash("Demande envoyée ! Un admin va changer ton mot de passe.");
  };
 
  const submit=async()=>{
    const l=login.trim().toLowerCase();
    if(!l||!pwd){ flash("Identifiant et mot de passe requis"); return; }
    if(mode==="signup"){
      if(db.users[l]){ flash("Cet identifiant existe déjà"); return; }
      if(db.pending && db.pending[l]){ flash("Ce compte est déjà en attente de validation"); return; }
      const avatar = AV_IDS[(Object.keys(db.users).length+Object.keys(db.pending||{}).length) % AV_IDS.length];
      const hpwd = await hashPwd(pwd); // mot de passe haché (jamais stocké en clair)
      // Un compte est admin uniquement s'il fait partie de la liste blanche.
      const isWhitelistedAdmin = ADMIN_CORE.includes(l);
      if(isWhitelistedAdmin){
        persist(prev=>{
          prev.users[l]={login:l,pwd:hpwd,name:name.trim()||l,avatar,isAdmin:true,approved:true,adjust:0};
          return prev;
        });
        flash("Compte admin créé !");
        setTimeout(()=>onLogin(l),300);
      } else {
        // comptes suivants = en attente de validation par l'admin
        persist(prev=>{
          prev.pending=prev.pending||{};
          prev.pending[l]={login:l,pwd:hpwd,name:name.trim()||l,avatar,ts:Date.now()};
          // prévient les admins
          Object.values(prev.users).filter(u=>u.isAdmin).forEach(a=>{
            pushNotif(prev, a.login, "account", `Nouvelle inscription à valider : ${name.trim()||l} (@${l})`);
          });
          return prev;
        });
        setMode("login");
        flash("Demande envoyée ! Un admin doit valider ton compte.");
      }
    } else {
      const u=db.users[l];
      if(db.pending && db.pending[l]){ flash("Compte en attente de validation par l'admin"); return; }
      if(!u || !(await verifyPwd(pwd, u.pwd))){ flash("Identifiant ou mot de passe incorrect"); return; }
      if(u.approved===false){ flash("Compte en attente de validation par l'admin"); return; }
      // Migration transparente : si l'ancien mot de passe était en clair, on le convertit en empreinte.
      if(!isHashed(u.pwd)){
        const hp=await hashPwd(pwd);
        persist(prev=>{ if(prev.users[l]) prev.users[l].pwd=hp; return prev; });
      }
      onLogin(l);
    }
  };
 
  return (
    <div style={{...S.app,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <Style/>
      <div style={S.authCard}>
        <div style={{textAlign:"center",marginBottom:8}}>
          <div style={{fontSize:46}}>🏆</div>
          <h1 style={S.logo}>PRONO CDM 2026</h1>
          <p style={{color:MUT,margin:"4px 0 0",fontSize:13}}>Pronostics entre amis · USA · Canada · Mexique</p>
        </div>
        <div style={S.segment}>
          <button onClick={()=>setMode("login")} style={{...S.segBtn,...(mode==="login"?S.segOn:{})}}>Connexion</button>
          <button onClick={()=>setMode("signup")} style={{...S.segBtn,...(mode==="signup"?S.segOn:{})}}>Inscription</button>
        </div>
        {mode==="signup" && <input style={S.input} placeholder="Pseudo affiché" value={name} onChange={e=>setName(e.target.value)}/>}
        <input style={S.input} placeholder="Identifiant" value={login} onChange={e=>setLogin(e.target.value)}/>
        <input style={S.input} type="password" placeholder="Mot de passe" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
        {noUsers && mode==="signup" && <div style={S.adminNote}>👑 Premier compte créé = administrateur</div>}
        {!noUsers && mode==="signup" && <div style={S.adminNote}>⏳ Ton compte devra être validé par un administrateur avant ta première connexion.</div>}
        <button onClick={submit} style={S.primaryBtn}>{mode==="login"?"Se connecter":"Créer mon compte"}</button>
 
        {mode==="login" && (
          <div style={S.demoBox}>
            <div style={S.demoTitle}>🔑 Mot de passe oublié ?</div>
            <div style={S.demoHint}>Saisis ton identifiant : un administrateur recevra ta demande et te transmettra un nouveau mot de passe.</div>
            <input style={{...S.input,marginTop:8}} placeholder="Ton identifiant" value={reqLogin} onChange={e=>setReqLogin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitPwdRequest()}/>
            <button onClick={submitPwdRequest} style={{...S.secondaryBtn,marginTop:4}}>Demander un changement de mot de passe</button>
          </div>
        )}
 
        <p style={{fontSize:11,color:MUT,textAlign:"center",marginTop:12,lineHeight:1.5}}>
          Jeu entre amis. Les mots de passe sont stockés en clair dans le navigateur — n'utilisez pas un mot de passe sensible.
        </p>
      </div>
      {toast && <div style={S.toast}>{toast}</div>}
    </div>
  );
}

// ----------------------- Onglet MATCHS --------------------------------------
function Matchs({db,me,now,persist,flash}){
  const [round,setRound]=useState("Groupes");
  const myP=db.pronos[me]||{};
  const bonusUsed=myP._bonus;
 
  const rounds = useMemo(()=>{
    const m={}; MATCHES.forEach(x=>{ (m[x.round]=m[x.round]||[]).push(x); });
    return m;
  },[]);
  // Matchs terminés (score validé par l'admin) -> masqués ici, ils sont dans l'onglet « Terminés ».
  const isDone=(m)=>{ const s=db.scores[m.id]; return s && s.hs!=null && s.as!=null; };
  const list = (rounds[round]||[]).filter(m=>!isDone(m)).slice().sort((a,b)=>a.dt.localeCompare(b.dt));
 
  // résolution des équipes pour les phases finales (admin peut renseigner)
  const resolve=(m)=>{
    const k=db.koTeams[m.id];
    return { home:k?.home||m.home, away:k?.away||m.away };
  };
 
  const setProno=(mid,field,val)=>{
    persist(prev=>{
      const p=prev.pronos[me]||(prev.pronos[me]={_bonus:null,_winner:null,_scorer:null});
      p[mid]=p[mid]||{hp:"",ap:""};
      p[mid][field]=val===""?"":Math.max(0,Math.min(20,parseInt(val)||0));
      return prev;
    });
  };
  const toggleBonus=(mid)=>{
    if(isLocked(MATCHES.find(m=>m.id===mid).dt,now)){ flash("Match commencé, bonus verrouillé"); return; }
    persist(prev=>{
      const p=prev.pronos[me]||(prev.pronos[me]={});
      if(p._bonus===mid){ p._bonus=null; }
      else {
        if(p._bonus){ const old=p._bonus; if(isLocked(MATCHES.find(m=>m.id===old).dt,now)){ } }
        p._bonus=mid;
      }
      return prev;
    });
  };
 
  // répartition des pronos (1/N/2) de tous les joueurs pour un match -> stats façon MPP
  const distrib=(mid)=>{
    let h=0,n=0,a=0;
    Object.values(db.pronos).forEach(p=>{
      const pr=p[mid]; if(!pr||pr.hp===""||pr.ap==="") return;
      const s=Math.sign(Number(pr.hp)-Number(pr.ap));
      if(s>0)h++; else if(s<0)a++; else n++;
    });
    const tot=h+n+a;
    return {h,n,a,tot,ph:tot?Math.round(h/tot*100):0,pn:tot?Math.round(n/tot*100):0,pa:tot?Math.round(a/tot*100):0};
  };
 
  return (
    <div>
      <RoundTabs round={round} setRound={setRound}/>
      {round!=="Groupes" && <div style={S.koInfo}>🔒 Phases finales : les équipes apparaîtront une fois renseignées par l'admin. Vous pouvez déjà pronostiquer dès qu'elles sont connues.</div>}
      {round==="Groupes" && <GroupTables db={db}/>}
      <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:12}}>
        {list.map(m=>{
          const {home,away}=resolve(m);
          const locked=isLocked(m.dt,now);
          const score=db.scores[m.id];
          const prono=myP[m.id];
          const pts=score?matchPoints(prono,score,db.rules,home,away):null;
          const isBonus=bonusUsed===m.id;
          return (
            <MatchCard key={m.id} m={m} home={home} away={away} locked={locked}
              score={score} prono={prono} pts={pts} isBonus={isBonus} bonusUsed={bonusUsed}
              rules={db.rules} stats={distrib(m.id)}
              onScore={(f,v)=>setProno(m.id,f,v)} onBonus={()=>toggleBonus(m.id)}/>
          );
        })}
        {list.length===0 && <p style={{color:MUT,textAlign:"center",marginTop:20}}>Aucun match à venir ici.<br/>Les matchs terminés sont dans l'onglet « Terminés ».</p>}
      </div>
    </div>
  );
}

      {ROUND_ORDER.map(r=>(
        <button key={r} onClick={()=>setRound(r)} style={{...S.roundBtn,...(round===r?S.roundOn:{})}}>{r}</button>
      ))}

function MatchCard({m,home,away,locked,score,prono,pts,isBonus,bonusUsed,rules,stats,onScore,onBonus}){
  const o=!m.ph?matchOdds(home,away):null;
  return (
    <div className="ppcard" style={{...S.card,...(isBonus?{boxShadow:`0 0 0 2px ${GOLD}, 0 8px 24px rgba(201,162,39,.3)`}:{})}}>
      <div style={S.cardTop}>
        <span style={S.groupBadge}>{m.group?`🏆 Groupe ${m.group}`:(m.label||m.round)}</span>
        <span style={{fontSize:11,color:MUT,fontWeight:600}}>{fmtDate(m.dt)} · {fmtTime(m.dt)}</span>
      </div>
      <div style={S.matchRow}>
        <div style={S.teamCol}><Flag team={home} size={46}/><span style={S.teamColLbl}>{home}</span></div>
        <div style={S.scoreBox}>
          {locked ? (
            <div style={{textAlign:"center"}}>
              {score ? <div style={S.finalScore}>{score.hs} : {score.as}</div>
                     : <div style={{fontSize:11,color:MUT,fontWeight:700}}>EN ATTENTE</div>}
              {prono && <div style={S.pronoMini}>Ton pari : {prono.hp}–{prono.ap}</div>}
            </div>
          ):(
            <div style={{display:"flex",alignItems:"center",gap:7}}>

// Affiche tous les matchs dont le score a été saisi par l'admin.
// Pour un joueur : son pronostic + le score final juste en dessous + points gagnés.
function Termines({db,me,isAdmin}){
  const myP = (!isAdmin && db.pronos[me]) ? db.pronos[me] : {};
  const resolve=(m)=>{ const k=db.koTeams[m.id]; return {home:k?.home||m.home,away:k?.away||m.away}; };
  // matchs avec un score complet, triés du plus récent au plus ancien
  const done = MATCHES
    .filter(m=>{ const s=db.scores[m.id]; return s && s.hs!=null && s.as!=null; })
    .sort((a,b)=>b.dt.localeCompare(a.dt));
 
  if(done.length===0){
    return (
      <div>
        <h2 style={S.h2}>✅ Matchs terminés</h2>
        <p style={{color:MUT,textAlign:"center",marginTop:30}}>Aucun match terminé pour l'instant.<br/>Les matchs apparaîtront ici dès qu'un score est saisi.</p>

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {done.map(m=>{

          const sc=db.scores[m.id];

          const hasProno = prono && prono.hp!=="" && prono.ap!=="" && prono.hp!=null && prono.ap!=null;
          const isBonus = myP._bonus===m.id;
          let pts = (!isAdmin && hasProno) ? matchPoints(prono,sc,db.rules,home,away) : 0;
          if(isBonus) pts = Math.round(pts*2*10)/10;
          const exact = hasProno && Number(prono.hp)===sc.hs && Number(prono.ap)===sc.as;
          return (

// Classement d'un groupe selon les vrais scores saisis (règle FIFA : V=3, N=1, D=0).
function groupStandings(db, teams){
  const st={}; teams.forEach(t=>st[t]={team:t,j:0,g:0,gc:0,pts:0});
  MATCHES.forEach(m=>{
    if(m.round!=="Groupes") return;
    if(!teams.includes(m.home)||!teams.includes(m.away)) return;
    const sc=db.scores[m.id]; if(!sc||sc.hs==null||sc.as==null) return;
    const H=st[m.home], A=st[m.away];
    H.j++; A.j++; H.g+=sc.hs; H.gc+=sc.as; A.g+=sc.as; A.gc+=sc.hs;
    if(sc.hs>sc.as){ H.pts+=3; } else if(sc.hs<sc.as){ A.pts+=3; } else { H.pts++; A.pts++; }
  });
  return Object.values(st).sort((a,b)=>
    b.pts-a.pts || (b.g-b.gc)-(a.g-a.gc) || b.g-a.g || a.team.localeCompare(b.team,"fr")
  );
}

// ----------------------- Calcul du classement -------------------------------
function computeStandings(db){
  // Les administrateurs ne pronostiquent pas et n'apparaissent PAS au classement.
  return Object.values(db.users).filter(u=>!u.isAdmin).map(u=>{
    const p=db.pronos[u.login]||{};
    let pts=0, exact=0, good=0;
    MATCHES.forEach(m=>{
      const sc=db.scores[m.id]; if(!sc) return;
      const k=db.koTeams[m.id]; const home=k?.home||m.home, away=k?.away||m.away;
      let mp=matchPoints(p[m.id],sc,db.rules,home,away);
      if(p._bonus===m.id) mp*=2;
      if(mp>0){ if(Number(p[m.id]?.hp)===sc.hs&&Number(p[m.id]?.ap)===sc.as) exact++; else good++; }
      pts+=mp;
    });
    if(db.finalWinner && p._winner===db.finalWinner) pts+=winnerOdds(db.finalWinner);
    if(db.topScorer && p._scorer===db.topScorer) pts+=scorerOdds(db.topScorer);
    const adjust = Number(u.adjust)||0; // points ajoutés/retirés manuellement par l'admin
    pts += adjust;
    return {...u, pts:Math.round(pts*10)/10, exact, good, adjust};
  }).sort((a,b)=> b.pts-a.pts || b.exact-a.exact);
}
 
function Classement({db,me}){
  const rows=computeStandings(db);
  const medal=["🥇","🥈","🥉"];
  return (
    <div>
      <h2 style={S.h2}>🏅 Classement général</h2>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {rows.map((r,i)=>(
          <div key={r.login} className="pprank" style={{...S.rankRow,...(r.login===me?{background:"rgba(201,162,39,.12)",borderColor:GOLD}:{})}}>
            <span style={S.rankPos}>{medal[i]||`#${i+1}`}</span>
            <span style={{flex:1,fontWeight:700,color:TXT,display:"flex",alignItems:"center",gap:8}}><Avatar id={avId(r.avatar)} size={28}/> {r.name}{r.isAdmin?" 👑":""}</span>
            <span style={{fontSize:11,color:MUT,marginRight:8}}>✓{r.exact} exact · {r.good} bon{r.adjust?` · ${r.adjust>0?"+":""}${r.adjust} ajust.`:""}</span>
            <span style={S.rankPts}>{r.pts}</span>
          </div>
        ))}
        {rows.length===0 && <p style={{color:MUT,textAlign:"center"}}>Aucun joueur pour l'instant.</p>}
      </div>
      <div style={S.legend}>Système façon MPP : un bon résultat rapporte la cote (en points) de l'issue trouvée — un favori ~15-20 pts, un outsider 50-85 pts. Score exact = ×{db.rules.exactMult}. Bonus x2 utilisable 1 fois. Vainqueur & buteur : points selon la cote (un outsider rapporte beaucoup plus).</div>
    </div>
  );
}

function Chat({db,user,persist}){
  const [text,setText]=useState("");
  const endRef=useRef(null);
  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:"smooth"}); },[db.chat.length]);
  const send=()=>{
    const t=text.trim(); if(!t) return;
    persist(prev=>{
      prev.chat.push({id:Date.now()+""+Math.random(),login:user.login,name:user.name,avatar:user.avatar,text:t,ts:Date.now()});
      if(prev.chat.length>300) prev.chat=prev.chat.slice(-300);
      // notifie tous les autres membres
      Object.keys(prev.users).filter(l=>l!==user.login).forEach(l=>{
        pushNotif(prev, l, "chat", `💬 ${user.name} : ${t.length>60?t.slice(0,60)+"…":t}`);
      });
      return prev;
    });
    setText("");
  };
  const delMsg=(id)=>{ if(confirm("Supprimer ce message ?")) persist(prev=>{ prev.chat=prev.chat.filter(c=>c.id!==id); return prev; }); };
  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 220px)"}}>
      <h2 style={S.h2}>💬 Chat de la ligue</h2>
      {user.isAdmin && <div style={S.adminHint}>👑 En tant qu'admin, tu peux supprimer n'importe quel message (bouton ✕ au survol/à côté de la bulle).</div>}
      <div style={S.chatBox}>
        {db.chat.length===0 && <p style={{color:MUT,textAlign:"center",marginTop:20}}>Lance la causerie ! 🎙️</p>}
        {db.chat.map(c=>{
          const mine=c.login===user.login;
          return (
            <div key={c.id} style={{display:"flex",justifyContent:mine?"flex-end":"flex-start",alignItems:"center",gap:6}}>
              {user.isAdmin && mine && <button onClick={()=>delMsg(c.id)} style={S.chatDel}>✕</button>}

                {!mine && <div style={{...S.bubbleName,display:"flex",alignItems:"center",gap:5}}><Avatar id={avId(c.avatar)} size={16}/> {c.name}</div>}
                <div>{c.text}</div>
                <div style={S.bubbleTime}>{new Date(c.ts).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</div>
              </div>
              {user.isAdmin && !mine && <button onClick={()=>delMsg(c.id)} style={S.chatDel}>✕</button>}
            </div>
          );
        })}
        <div ref={endRef}/>
      </div>
      <div style={{display:"flex",gap:8,marginTop:8}}>
        <input style={{...S.input,margin:0,flex:1}} placeholder="Ton message…" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}/>
        <button onClick={send} style={{...S.primaryBtn,margin:0,width:"auto",padding:"0 20px"}}>Envoyer</button>

// Validation des inscriptions en attente
function AdminValidation({db,persist,flash}){
  const pending = Object.values(db.pending||{});
  const pwdReqs = Object.values(db.pwdRequests||{});
  const approve=(login)=>persist(prev=>{
    const pu=prev.pending[login]; if(!pu) return prev;
    prev.users[login]={login:pu.login,pwd:pu.pwd,name:pu.name,avatar:pu.avatar,isAdmin:false,approved:true,adjust:0};
    prev.pronos[login]={_bonus:null,_winner:null,_scorer:null};
    delete prev.pending[login];
    pushNotif(prev, login, "account", "🎉 Ton compte a été validé ! Tu peux te connecter et pronostiquer.");
    return prev;
  });
  const reject=(login)=>{ if(!confirm(`Refuser et supprimer la demande de ${login} ?`)) return; persist(prev=>{ delete prev.pending[login]; return prev; }); flash(`Demande de ${login} refusée`); };
 
  // Traiter une demande de changement de mot de passe
  const changePwd=async(login)=>{
    const np=prompt(`Nouveau mot de passe pour ${login} :`);
    if(!np) return;
    const hp=await hashPwd(np);
    persist(prev=>{
      if(prev.users[login]) prev.users[login].pwd=hp;
      delete prev.pwdRequests[login];
      pushNotif(prev, login, "account", "🔑 Ton mot de passe a été changé par un admin. Tu peux te reconnecter.");
      return prev;
    });
    flash(`Mot de passe de ${login} changé`);
  };
  const dismissPwd=(login)=>persist(prev=>{ delete prev.pwdRequests[login]; return prev; });
 
  return (
    <div>
      <p style={S.adminHint}>Valide ou refuse les nouvelles inscriptions, et traite les demandes de changement de mot de passe. Tant qu'un compte n'est pas validé, la personne ne peut pas se connecter.</p>
 
      {/* Demandes de changement de mot de passe */}
      {pwdReqs.length>0 && (
        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:800,color:GOLD2,margin:"4px 0 8px"}}>🔑 Demandes de mot de passe</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {pwdReqs.map(r=>{
              const u=db.users[r.login];
              return (
                <div key={r.login} style={{...S.adminRow,flexWrap:"wrap",borderColor:`${GOLD}66`}}>
                  <span style={{flex:"1 1 100%",fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
                    {u && <Avatar id={avId(u.avatar)} size={24}/>} {r.name} <span style={{color:MUT,fontWeight:400}}>@{r.login}</span>
                    <span style={{marginLeft:"auto",fontSize:11,fontWeight:800,color:GOLD2,background:"rgba(201,162,39,.15)",padding:"3px 9px",borderRadius:20}}>⚠️ mot de passe à changer</span>
                  </span>
                  <div style={{display:"flex",gap:6,flex:"1 1 100%"}}>
                    <button onClick={()=>changePwd(r.login)} style={{...S.miniBtn,background:"rgba(74,222,128,.15)",color:"#4ade80",borderColor:"rgba(74,222,128,.4)"}}>🔑 Définir un nouveau MdP</button>
                    <button onClick={()=>dismissPwd(r.login)} style={S.miniBtn}>Ignorer</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
 
      {/* Inscriptions en attente */}
      <div style={{fontSize:13,fontWeight:800,color:GOLD2,margin:"4px 0 8px"}}>👤 Inscriptions en attente</div>
      {pending.length===0 && <p style={{color:MUT,textAlign:"center",margin:"10px 0 0"}}>Aucune inscription en attente. 👍</p>}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {pending.map(u=>(
          <div key={u.login} style={S.adminRow}>
            <span style={{flex:1,fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:7}}><Avatar id={avId(u.avatar)} size={24}/> {u.name} <span style={{color:MUT,fontWeight:400}}>@{u.login}</span></span>
            <button onClick={()=>approve(u.login)} style={{...S.miniBtn,background:"rgba(74,222,128,.15)",color:"#4ade80",borderColor:"rgba(74,222,128,.4)"}}>✓ Valider</button>
            <button onClick={()=>reject(u.login)} style={S.miniDel}>✕ Refuser</button>
          </div>
        ))}
      </div>
    </div>
  );
}
 
function AdminScores({db,persist,flash}){
  const [round,setRound]=useState("Groupes");
  // brouillon local des scores en cours de saisie (avant validation)
  const [draft,setDraft]=useState({});
  const list=MATCHES.filter(m=>m.round===round).sort((a,b)=>a.dt.localeCompare(b.dt));
  const resolve=(m)=>{ const k=db.koTeams[m.id]; return {home:k?.home||m.home,away:k?.away||m.away}; };
 
  const getVal=(mid,f)=>{
    if(draft[mid] && draft[mid][f]!==undefined) return draft[mid][f];
    const sc=db.scores[mid]; return sc && sc[f]!=null ? sc[f] : "";
  };
  const setDraftVal=(mid,f,v)=> setDraft(d=>({...d,[mid]:{...(d[mid]||{}),[f]:v}}));
 
  // Valide le score : enregistre + notifie les joueurs qui avaient parié sur ce match.
  const validate=(m)=>{
    const {home,away}=resolve(m);
    const hs=parseInt(getVal(m.id,"hs")), as=parseInt(getVal(m.id,"as"));
    if(isNaN(hs)||isNaN(as)){ flash("Renseigne les deux scores"); return; }
    persist(prev=>{
      prev.scores[m.id]={hs:Math.max(0,hs),as:Math.max(0,as)};
      // notifie chaque joueur (hors admin) ayant un pronostic sur ce match
      Object.values(prev.users).filter(u=>!u.isAdmin).forEach(u=>{
        const p=prev.pronos[u.login]||{};
        const pr=p[m.id];
        if(pr && pr.hp!=="" && pr.ap!=="" && pr.hp!=null && pr.ap!=null){
          let pts=matchPoints(pr,{hs:Math.max(0,hs),as:Math.max(0,as)},prev.rules,home,away);
          if(p._bonus===m.id) pts=Math.round(pts*2*10)/10;
          const res = pts>0 ? `+${pts} pts pour toi 🎉` : "0 pt cette fois";
          pushNotif(prev, u.login, "score", `Score : ${home} ${Math.max(0,hs)}–${Math.max(0,as)} ${away}. ${res}`);
        }
      });
      return prev;
    });
    setDraft(d=>{ const n={...d}; delete n[m.id]; return n; });
    flash(`Score validé : ${home} ${Math.max(0,hs)}–${Math.max(0,as)} ${away}`);
  };
  const clear=(m)=>persist(prev=>{ delete prev.scores[m.id]; return prev; });
 
  return (
    <div>
      <p style={S.adminHint}>Saisis le score puis clique sur ✓ pour le valider. Le match bascule dans « Terminés », les points sont recalculés et les joueurs concernés sont notifiés.</p>
      <RoundTabs round={round} setRound={setRound}/>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:10}}>
        {list.map(m=>{ const {home,away}=resolve(m); const sc=db.scores[m.id];
          const dirty = draft[m.id] && (String(getVal(m.id,"hs"))!==String(sc?.hs??"") || String(getVal(m.id,"as"))!==String(sc?.as??""));
          return (
          <div key={m.id} style={{...S.adminRow,...(sc?{borderColor:"rgba(74,222,128,.35)"}:{})}}>
            <span style={{flex:1,fontSize:13,display:"flex",alignItems:"center",gap:6}}><Flag team={home} size={20}/> {home} <b style={{opacity:.6}}>vs</b> {away} <Flag team={away} size={20}/></span>
            <input type="number" min="0" value={getVal(m.id,"hs")} onChange={e=>setDraftVal(m.id,"hs",e.target.value)} style={S.adminScore}/>
            <span>–</span>
            <input type="number" min="0" value={getVal(m.id,"as")} onChange={e=>setDraftVal(m.id,"as",e.target.value)} style={S.adminScore}/>
            <button onClick={()=>validate(m)} style={{...S.miniBtn,background:dirty||!sc?"rgba(74,222,128,.15)":SURF2,color:dirty||!sc?"#4ade80":MUT,borderColor:dirty||!sc?"rgba(74,222,128,.4)":LINE}}>{sc&&!dirty?"✓ Validé":"✓"}</button>
            {sc && <button onClick={()=>clear(m)} style={S.miniDel}>✕</button>}
          </div>
        );})}
      </div>
    </div>
  );
}

function AdminUsers({db,persist,flash}){
  const users=Object.values(db.users);
  const [amount,setAmount]=useState(10); // montant de points à ajouter/retirer
  const resetPwd=async(login)=>{ const np=prompt(`Nouveau mot de passe pour ${login} :`); if(np){ const hp=await hashPwd(np); persist(prev=>{ prev.users[login].pwd=hp; pushNotif(prev,login,"account","🔑 Ton mot de passe a été réinitialisé par un admin."); return prev; }); flash(`Mot de passe de ${login} changé`); } };
  const del=(login)=>{ if(confirm(`Supprimer le joueur ${login} ?`)) persist(prev=>{ delete prev.users[login]; delete prev.pronos[login]; if(prev.notifs) delete prev.notifs[login]; return prev; }); };
  const toggleAdmin=(login)=>persist(prev=>{
    const u=prev.users[login]; if(!u) return prev;
    const willBeAdmin=!u.isAdmin;
    u.isAdmin=willBeAdmin;
    if(willBeAdmin){ delete prev.pronos[login]; } // un admin ne pronostique pas
    else if(!prev.pronos[login]){ prev.pronos[login]={_bonus:null,_winner:null,_scorer:null}; }
    pushNotif(prev, login, "account", willBeAdmin?"👑 Tu es désormais administrateur.":"Ton rôle administrateur a été retiré.");
    return prev;
  });
  const addPts=(login,delta)=>persist(prev=>{
    prev.users[login].adjust=Math.round(((Number(prev.users[login].adjust)||0)+delta)*10)/10;
    pushNotif(prev,login,"points",`${delta>0?"+":""}${delta} pts ajustés par un admin (total ajustements : ${prev.users[login].adjust}).`);
    return prev;
  });
  const resetPts=(login)=>persist(prev=>{ prev.users[login].adjust=0; return prev; });
 
  return (
    <div>
      <p style={S.adminHint}>Gère les comptes : nommer ou retirer un administrateur, changer un mot de passe (de n'importe quel compte, admin compris), supprimer un joueur, et ajouter ou retirer des points. Les comptes admin/secours restent toujours admin.</p>
      <div style={{display:"flex",alignItems:"center",gap:8,background:SURF,border:`1px solid ${LINE}`,borderRadius:10,padding:"9px 11px",marginBottom:10}}>
        <span style={{fontSize:12,color:MUT,fontWeight:700}}>Montant points :</span>
        <input type="number" value={amount} onChange={e=>setAmount(parseFloat(e.target.value)||0)} style={{...S.adminScore,width:64}}/>
        <span style={{fontSize:11,color:MUT}}>utilisé par les boutons + / −</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {users.map(u=>{
          const adj=Number(u.adjust)||0;
          return (
          <div key={u.login} style={{...S.adminRow,flexWrap:"wrap"}}>
            <span style={{flex:"1 1 100%",fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
              <Avatar id={avId(u.avatar)} size={24}/> {u.name} <span style={{color:MUT,fontWeight:400}}>@{u.login}{u.isAdmin?" 👑":""}</span>
              {!u.isAdmin && adj!==0 && <span style={{marginLeft:"auto",fontSize:12,fontWeight:800,color:adj>0?"#4ade80":"#f87171"}}>{adj>0?"+":""}{adj} pts</span>}
            </span>
            {!u.isAdmin && (
              <div style={{display:"flex",alignItems:"center",gap:6,flex:"1 1 100%",marginBottom:4}}>
                <button onClick={()=>addPts(u.login,Math.abs(amount))} style={{...S.miniBtn,background:"rgba(74,222,128,.15)",color:"#4ade80",borderColor:"rgba(74,222,128,.4)"}}>+{Math.abs(amount)} pts</button>
                <button onClick={()=>addPts(u.login,-Math.abs(amount))} style={{...S.miniBtn,background:"rgba(248,113,113,.15)",color:"#f87171",borderColor:"rgba(248,113,113,.4)"}}>−{Math.abs(amount)} pts</button>
                {adj!==0 && <button onClick={()=>resetPts(u.login)} style={S.miniBtn}>↺ Reset</button>}
              </div>
            )}
            <div style={{display:"flex",alignItems:"center",gap:6,flex:"1 1 100%",flexWrap:"wrap"}}>
              <button onClick={()=>resetPwd(u.login)} style={S.miniBtn}>🔑 MdP</button>
              {ADMIN_CORE.includes((u.login||"").toLowerCase())
                ? <span style={{...S.miniBtn,cursor:"default",opacity:.7}}>👑 Admin principal</span>
                : <button onClick={()=>toggleAdmin(u.login)} style={S.miniBtn}>{u.isAdmin?"Retirer admin":"Passer admin"}</button>}
              {!u.isAdmin && <button onClick={()=>del(u.login)} style={S.miniDel}>✕ Suppr.</button>}
            </div>
          </div>
        );})}
      </div>
    </div>
  );
}

function Style(){
  return <style>{`
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@400;500;600;700;800;900&display=swap');
    *{box-sizing:border-box} body{margin:0}
    input[type=number]::-webkit-inner-spin-button{opacity:.35}
    input:focus{border-color:${GREEN}!important}
    ::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-thumb{background:#3a3a3e;border-radius:4px}
    button{transition:transform .12s ease, box-shadow .2s ease, filter .2s ease}
    button:active{transform:scale(.96)}
    button:hover{filter:brightness(1.04)}
    @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    main > div > * { animation: fadeUp .35s ease both; }
    .ppcard:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(11,67,50,.15)!important}
    .pprank:hover{transform:translateX(3px)}
    .ppchip:hover{border-color:${GOLD}}
  `}</style>;
}

<!-- Transpilation contrôlée : transforme le JSX et affiche toute erreur à l'écran -->
<script>
(function(){
  function fail(m){ if(window.__pronoShow) window.__pronoShow(m); else { document.body.innerHTML='<pre style="color:#fff;padding:20px;white-space:pre-wrap">'+m+'</pre>'; } }
  try{
    if(typeof Babel==="undefined"){ fail("Babel n'est pas chargé (le CDN unpkg est peut-être bloqué sur ton réseau).\nEssaie en Wi-Fi, ou recharge la page."); return; }
    var src = document.getElementById("appcode").textContent;
    var out;
    try{
      out = Babel.transform(src, { presets: ["react"] }).code;
    }catch(err){
      fail("Le code n'a pas pu être transformé (erreur de syntaxe JSX) :\n\n"+(err&&err.message?err.message:err));
      return;
    }
    try{
      var script=document.createElement("script");
      script.textContent=out;
      document.body.appendChild(script);
    }catch(err){
      fail("Erreur à l'exécution de l'appli :\n\n"+(err&&err.message?err.message:err)+(err&&err.stack?("\n\n"+err.stack):""));
      return;
    }
  }catch(e){ fail("Erreur inattendue : "+(e&&e.message?e.message:e)); }
})();
</script>
